<style>
  :root {
    /* ── Semantic color aliases (สำหรับ Tech Update Modal) ── */
    --color-background-secondary: var(--surface);
    --color-background-tertiary: var(--bg2);
    --color-background-success: var(--green-bg);
    --color-background-warning: var(--yellow-bg);
    --color-background-danger: var(--red-bg);
    --color-background-info: rgba(59, 130, 246, .15);

    --color-border-secondary: var(--border);
    --color-border-tertiary: var(--border2);
    --color-border-success: rgba(16, 185, 129, .4);
    --color-border-warning: rgba(245, 158, 11, .4);
    --color-border-danger: rgba(244, 63, 94, .4);
    --color-border-info: rgba(59, 130, 246, .4);

    --color-text-primary: var(--text);
    --color-text-secondary: var(--text2);
    --color-text-tertiary: var(--text3);
    --color-text-success: var(--green);
    --color-text-warning: var(--yellow);
    --color-text-danger: var(--red);
    --color-text-info: #58a6ff;

    --border-radius-md: var(--r-sm);
    --bg: #f8fafc;
    --bg2: #f1f5f9;
    --surface: #ffffff;
    --surface2: #e2e8f0;
    --surface3: #cbd5e1;
    --border: rgba(0, 0, 0, 0.08);
    --border2: rgba(0, 0, 0, 0.15);
    --accent: #ef4444;
    --accent2: #f59e0b;
    --green: #059669;
    --green-bg: rgba(5, 150, 105, 0.10);
    --yellow: #d97706;
    --yellow-bg: rgba(217, 119, 6, 0.10);
    --red: #dc2626;
    --red-bg: rgba(220, 38, 38, 0.10);
    --orange: #ea580c;
    --orange-bg: rgba(234, 88, 12, 0.10);
    --purple: #7c3aed;
    --purple-bg: rgba(124, 58, 237, 0.10);
    --teal: #0d9488;
    --teal-bg: rgba(13, 148, 136, 0.10);
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --r: 16px;
    --r-sm: 10px;
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    --glow: 0 0 25px rgba(239, 68, 68, 0.10);
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  html,
  body {
    height: 100%;
    background-color: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5
  }

  ::-webkit-scrollbar {
    width: 6px;
    height: 6px
  }

  ::-webkit-scrollbar-track {
    background: transparent
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border2);
    border-radius: 3px
  }

  /* ── Loading ── */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(248, 250, 252, 0.85);
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.3s ease
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(0, 198, 255, 0.1);
    border-radius: 50%;
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
    box-shadow: var(--glow)
  }

  @keyframes spin {
    to {
      transform: rotate(360deg)
    }
  }

  /* ── Layout ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 80px
  }

  /* ── Header ── */
  .main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border)
  }

  .brand-section {
    display: flex;
    align-items: center;
    gap: 14px
  }

  .brand-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(to right, var(--text), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent
  }

  .brand-subtitle {
    font-size: 11px;
    color: var(--text2);
    margin-top: 1px
  }

  .user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border)
  }

  .profile-info {
    text-align: right
  }

  .profile-name {
    font-weight: 600;
    font-size: 13px
  }

  .profile-role {
    font-size: 10px;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 0.5px
  }

  .btn-logout {
    background: none;
    border: none;
    color: var(--red);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: transform 0.2s
  }

  .btn-logout:hover {
    transform: scale(1.1)
  }

  /* ── Login ── */
  #login-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80vh
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 32px 24px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
    text-align: center;
    position: relative;
    overflow: hidden
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0, 198, 255, 0.03) 0%, transparent 60%);
    pointer-events: none
  }

  .login-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px
  }

  .login-desc {
    color: var(--text2);
    font-size: 12px;
    margin-bottom: 24px
  }

  .login-error {
    background: var(--red-bg);
    border: 1px solid rgba(255, 82, 82, 0.2);
    color: var(--red);
    padding: 10px;
    border-radius: var(--r-sm);
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
    text-align: left
  }

  .form-group-login {
    margin-bottom: 16px;
    text-align: left
  }

  .form-group-login label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500
  }

  .login-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 12px 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: all 0.2s
  }

  .login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0, 198, 255, 0.15)
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: var(--r-sm);
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 15px rgba(0, 198, 255, 0.25);
    transition: opacity 0.2s;
    margin-top: 10px
  }

  .btn-login:hover {
    opacity: 0.9
  }

  .role-selector {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    background: var(--bg2);
    padding: 4px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    margin-bottom: 20px
  }

  .role-tab {
    background: transparent;
    border: none;
    color: var(--text2);
    padding: 8px 4px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.2s
  }

  .role-tab i {
    font-size: 14px
  }

  .role-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 2px 8px rgba(239, 68, 68, 0.2)
  }

  /* ── Tab Navigation ── */
  #dashboard-page {
    display: none
  }

  .tab-navigation {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    overflow-x: auto;
    white-space: nowrap
  }

  .tab-navigation::-webkit-scrollbar {
    display: none
  }

  .tab-btn {
    flex: 1;
    min-width: 100px;
    background: transparent;
    border: none;
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px
  }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 4px 12px rgba(0, 198, 255, 0.25)
  }

  .tab-btn:hover:not(.active) {
    color: var(--text);
    background: rgba(255, 255, 255, 0.02)
  }

  .view-panel {
    display: none;
    animation: tabFadeIn 0.3s ease-out
  }

  .view-panel.active {
    display: block
  }

  @keyframes tabFadeIn {
    from {
      opacity: 0;
      transform: translateY(10px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow)
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--teal)
  }

  /* ── Form ── */
  .form-grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 16px
  }

  .form-grid-2 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 16px
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px
  }

  .form-field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2)
  }

  .form-field label .req {
    color: var(--red);
    margin-left: 2px
  }

  .input-ctrl,
  .select-ctrl,
  .textarea-ctrl {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    font-size: 13.5px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: all 0.2s
  }

  .input-ctrl:focus,
  .select-ctrl:focus,
  .textarea-ctrl:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0, 198, 255, 0.1)
  }

  .select-ctrl {
    appearance: none;
    background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABaAAAAPPCAYAAAAy0mx9AAAACXBIWXMAAAsSAAALEgHS3X78AAAgAElEQVR4nOzdebhkVX3v/2+d03TAnG4g0Ri62wzXCzRkeO5FAc3gwBSu0hdBE4UoEHyiv0SFRE2MQREjxgFxCBdEvKIIYhKDcYpe0yqDGRhsTTTSLRiNCN04MPVpxu5z6vfHOaeprt57r/Vd67vWXnvX+/U8/ZyqvYa9q07VqrU/tXqfwXA4FAAAAAAAAAAArE21fQAAAAAAAAAAgH4igAYAAAAAAAAAJEEADQAAAAAAAABIggAaAAAAAAAAAJAEATQAAAAAAAAAIAkCaAAAAAAAAABAEgTQAAAAAAAAAIAkCKABAAAAAAAAAEkQQAMAAAAAAAAAkiCABgAAAAAAAAAkQQANAAAAAAAAAEiCABoAAAAAAAAAkAQBNAAAAAAAAAAgCQJoAAAAAAAAAEASBNAAAAAAAAAAgCQIoAEAAAAAAAAASRBAAwAAAAAAAACSIIAGAAAAAAAAACRBAA0AAAAAAAAASIIAGgAAAAAAAACQBAE0AAAAAAAAACAJAmgAAAAAAAAAQBIE0AAAAAAAAACAJAigAQAAAAAAAABJEEADAAAAAAAAAJIggAYAAAAAAAAAJEEADQAAAAAAAABIggAaAAAAAAAAAJAEATQAAAAAAAAAIAkCaAAAAAAAAABAEgTQAAAAAAAAAIAkCKABAAAAAAAAAEkQQAMAAAAAAAAAkiCABgAAAA...iVBORw0KGgoAAAANSUhEUgAABaAAAAPP");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-color: var(--bg2);
    padding-right: 32px;
    cursor: pointer
  }

  .select-ctrl option {
    background: var(--bg2);
    color: var(--text)
  }

  .textarea-ctrl {
    resize: vertical;
    min-height: 80px
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: var(--r-sm);
    font-size: 13.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    border: none
  }

  .btn-accent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 4px 15px rgba(0, 198, 255, 0.2)
  }

  .btn-accent:hover {
    opacity: 0.95;
    transform: translateY(-1px)
  }

  .btn-sec {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2)
  }

  .btn-sec:hover {
    border-color: var(--border2);
    color: var(--text)
  }

  .btn-danger {
    background: var(--red-bg);
    border: 1px solid rgba(255, 82, 82, 0.2);
    color: var(--red)
  }

  .btn-danger:hover {
    background: rgba(255, 82, 82, 0.2)
  }

  .actions-panel {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border)
  }

  .btn-action {
    background: none;
    border: none;
    color: var(--teal);
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid rgba(45, 212, 191, 0.15);
    transition: all 0.2s;
    white-space: nowrap;
    font-family: inherit;
    font-size: 12px
  }

  .btn-action:hover {
    background: var(--teal-bg)
  }

  /* ── Stats ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 20px
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    text-align: center;
    position: relative
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 10%;
    right: 10%;
    height: 2px;
    background: transparent
  }

  .stat-card.yellow::after {
    background: var(--yellow)
  }

  .stat-card.green::after {
    background: var(--green)
  }

  .stat-card.red::after {
    background: var(--red)
  }

  .stat-card.blue::after {
    background: var(--accent)
  }

  .stat-card.teal::after {
    background: var(--teal)
  }

  .stat-card.orange::after {
    background: var(--orange)
  }

  .stat-label {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    font-family: var(--font-mono);
    line-height: 1.1
  }

  /* ── Table ── */
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow-x: auto;
    margin-bottom: 20px
  }

  table.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    text-align: left
  }

  table.data-table th {
    background: var(--bg2);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap
  }

  table.data-table td {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    vertical-align: middle
  }

  table.data-table tr:last-child td {
    border-bottom: none
  }

  table.data-table tr:hover td {
    background: rgba(255, 255, 255, 0.01)
  }

  /* ── Pills & Badges ── */
  .pill {
    display: inline-block;
    font-size: 11.5px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap
  }

  .pill-waiting {
    background: var(--yellow-bg);
    color: var(--yellow)
  }

  .pill-repairing {
    background: rgba(0, 198, 255, 0.12);
    color: var(--accent)
  }

  .pill-completed {
    background: rgba(255, 145, 0, 0.12);
    color: var(--orange)
  }

  .pill-closed {
    background: var(--green-bg);
    color: var(--green)
  }

  .pill-fail {
    background: var(--red-bg);
    color: var(--red)
  }

  .spill {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap
  }

  .sp-pend {
    background: var(--yellow-bg);
    color: var(--yellow)
  }

  .sp-prog {
    background: rgba(0, 198, 255, 0.12);
    color: var(--accent)
  }

  .sp-done {
    background: var(--green-bg);
    color: var(--green)
  }

  .sp-over {
    background: var(--red-bg);
    color: var(--red)
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap
  }

  .badge-green {
    background: var(--green-bg);
    color: var(--green)
  }

  .badge-amber {
    background: var(--yellow-bg);
    color: var(--yellow)
  }

  .badge-red {
    background: var(--red-bg);
    color: var(--red)
  }

  .lbl-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--purple-bg);
    color: var(--purple)
  }

  .lbl-sla {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600
  }

  .lbl-sla.good {
    color: var(--green)
  }

  .lbl-sla.bad {
    color: var(--red)
  }

  /* ── Calendar (shared base) ── */
  .calendar-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    margin-bottom: 20px
  }

  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border)
  }

  .calendar-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s
  }

  .calendar-nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent)
  }

  .calendar-title {
    font-size: 16px;
    font-weight: 700
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr)
  }

  .calendar-dow {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    padding: 10px 4px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border)
  }

  .calendar-day {
    min-height: 80px;
    padding: 6px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.15s
  }

  .calendar-day:nth-child(7n) {
    border-right: none
  }

  .calendar-day:hover {
    background: rgba(255, 255, 255, 0.02)
  }

  .calendar-day.other-month {
    opacity: 0.3
  }

  .calendar-day.selected {
    background: rgba(0, 198, 255, 0.08)
  }

  .day-number-badge {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text2);
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin-bottom: 4px
  }

  .day-number-badge.is-today {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 0 10px rgba(0, 198, 255, 0.4)
  }

  .event-container {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 52px;
    overflow-y: hidden
  }

  .cal-event-pill {
