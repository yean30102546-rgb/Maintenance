<style>
  /* ================================================
     TECHNICIAN PANEL
     ================================================ */

  #tech-panel-page {
    display: none;
    position: relative;
    z-index: 1;
    padding: 20px 0 40px
  }

  .tp-wrap {
    background: var(--bg2);
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 14px;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border)
  }

  .tp-topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between
  }

  .tp-tb-left {
    display: flex;
    align-items: center;
    gap: 10px
  }

  .tp-tb-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px
  }

  .tp-tb-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text)
  }

  .tp-tb-sub {
    font-size: 10px;
    color: var(--text2)
  }

  .tp-logout {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    cursor: pointer;
    transition: .15s
  }

  .tp-logout:hover {
    background: var(--red-bg)
  }

  .tp-profile {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px
  }

  .tp-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0
  }

  .tp-pname {
    font-size: 13px;
    font-weight: 600
  }

  .tp-prole {
    font-size: 10px;
    color: var(--purple);
    letter-spacing: .5px
  }

  .tp-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 14px
  }

  .tp-sbox {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
    border-top: 2px solid transparent;
    transition: .2s
  }

  .tp-sbox.y {
    border-top-color: var(--yellow)
  }

  .tp-sbox.b {
    border-top-color: #2563eb
  }

  .tp-sbox.g {
    border-top-color: var(--green)
  }

  .tp-snum {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--font-mono);
    transition: .3s
  }

  .tp-snum.y {
    color: var(--yellow)
  }

  .tp-snum.b {
    color: #2563eb
  }

  .tp-snum.g {
    color: var(--green)
  }

  .tp-slbl {
    font-size: 9px;
    color: var(--text2);
    margin-top: 2px
  }

  .tp-tabs {
    display: flex;
    gap: 4px;
    padding: 0 14px 10px;
    overflow-x: auto
  }

  .tp-tabs::-webkit-scrollbar {
    display: none
  }

  .tp-tab {
    flex: 1;
    min-width: 62px;
    padding: 7px 3px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    white-space: nowrap;
    transition: .15s;
    font-family: inherit
  }

  .tp-tab:hover {
    border-color: #2563eb;
    color: #2563eb
  }

  .tp-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border-color: transparent
  }

  .tp-tbadge {
    min-width: 15px;
    height: 15px;
    border-radius: 8px;
    padding: 0 3px;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    transition: .3s
  }

  .tp-tbadge.red {
    background: var(--accent);
    color: #fff
  }

  .tp-tbadge.blue {
    background: #2563eb;
    color: #fff
  }

  .tp-tbadge.teal {
    background: var(--teal);
    color: #fff
  }

  .tp-tbadge.purple {
    background: var(--purple);
    color: #fff
  }

  .tp-sec {
    padding: 0 14px 16px
  }

  .tp-sdiv {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 8px;
    padding: 0 2px
  }

  .tp-jcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: .2s
  }

  .tp-jcard:hover {
    border-color: var(--border2)
  }

  .tp-jcard.ov {
    border-left: 3px solid var(--red)
  }

  .tp-jtop {
    padding: 11px 13px 5px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between
  }

  .tp-jid {
    font-size: 10px;
    font-family: var(--font-mono);
    color: #2563eb;
    font-weight: 600
  }

  .tp-jstat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px
  }

  .tp-jstat.wait {
    background: var(--yellow-bg);
    color: var(--yellow)
  }

  .tp-jstat.work {
    background: rgba(37, 99, 235, .10);
    color: #2563eb
  }

  .tp-jstat.done-s {
    background: var(--green-bg);
    color: var(--green)
  }

  .tp-jdot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor
  }

  .tp-jtitle {
    font-size: 14px;
    font-weight: 700;
    padding: 0 13px;
    margin-bottom: 2px
  }

  .tp-jdesc {
    font-size: 11px;
    color: var(--text2);
    padding: 0 13px;
    margin-bottom: 7px
  }

  .tp-jovr {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--red);
    background: var(--red-bg);
    border: 1px solid var(--color-border-danger);
    border-radius: 5px;
    padding: 2px 7px;
    margin: 0 13px 7px
  }

  .tp-jtags {
    display: flex;
    gap: 5px;
    padding: 0 13px 7px;
    flex-wrap: wrap
  }

  .tp-jtag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid var(--border);
    color: var(--text2)
  }

  .tp-jdate {
    font-size: 10px;
    color: var(--text2);
    padding: 0 13px 8px;
    display: flex;
    align-items: center;
    gap: 4px
  }

  .tp-jact {
    padding: 9px 13px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 7px
  }

  .tp-jbtn-v {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-weight: 600;
    font-family: inherit;
    transition: .15s
  }

  .tp-jbtn-v:hover {
    border-color: #2563eb;
    color: #2563eb
  }

  .tp-jbtn-a {
    flex: 2;
    padding: 8px;
    border-radius: 8px;
    border: none;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-weight: 700;
    font-family: inherit;
    transition: .15s
  }

  .tp-jbtn-a:active {
    transform: scale(.97)
  }

  .tp-jbtn-a.acc {
    background: var(--green);
    color: #fff
  }

  .tp-jbtn-a.acc:hover {
    background: #047857
  }

  .tp-jbtn-a.upd {
    background: var(--yellow);
    color: #000
  }

  .tp-jbtn-a.upd:hover {
    background: #b45309
  }

  .tp-jbtn-a.fin {
    background: #2563eb;
    color: #fff
  }

  .tp-jbtn-a.fin:hover {
    background: #1d4ed8
  }

  .tp-jbtn-done {
    flex: 2;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--color-border-success);
    background: transparent;
    color: var(--green);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-weight: 600;
    font-family: inherit;
    cursor: default
  }

  .tp-empty {
    text-align: center;
    padding: 2.5rem;
    color: var(--text3);
    font-size: 12px
  }

  /* Tech PM mini */
  .tp-pmini-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 12px
  }

  .tp-pmini {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 4px;
    text-align: center
  }

  .tp-pmini-num {
    font-size: 17px;
    font-weight: 700;
    font-family: var(--font-mono);
    transition: .3s
  }

  .tp-pmini-lbl {
    font-size: 9px;
    color: var(--text2);
    margin-top: 1px
  }

  .tp-sbar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px
  }

  .tp-sinp {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 11px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    transition: .15s
  }

  .tp-sinp:focus {
    border-color: #2563eb
  }

  .tp-ssel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 8px;
    font-size: 11px;
    color: var(--text2);
    outline: none;
    cursor: pointer;
    font-family: inherit;
    transition: .15s
  }

  .tp-ssel:focus {
    border-color: #2563eb
  }

  .tp-pcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 12px 13px;
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    transition: .2s
  }

  .tp-pcard:hover {
    border-color: var(--border2)
  }

  .tp-pcard.ov {
    border-left: 3px solid var(--red)
  }

  .tp-pcleft {
    flex: 1;
    min-width: 0
  }

  .tp-pmach {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis
  }

  .tp-ptype {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 4px
  }

  .tp-pfreq {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--bg2);
    color: var(--text2);
    border: 1px solid var(--border)
  }

  .tp-pdate {
    font-size: 10px;
    color: var(--text2);
    margin-top: 4px
  }

  .tp-pcright {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0
  }

  .tp-ppill {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap
  }

  .tp-ppill.pend {
    background: var(--yellow-bg);
    color: var(--yellow)
  }

  .tp-ppill.over {
    background: var(--red-bg);
    color: var(--red)
  }

  .tp-ppill.done {
    background: var(--green-bg);
    color: var(--green)
  }

  .tp-ppill.prog {
    background: rgba(37, 99, 235, .10);
    color: #2563eb
  }

  .tp-pcbtn {
    font-size: 10px;
    padding: 4px 9px;
    border-radius: 6px;
    border: 1px solid rgba(13, 148, 136, .3);
    background: transparent;
    color: var(--teal);
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
    transition: .15s
  }

  .tp-pcbtn:hover {
    background: var(--teal-bg)
  }

  .tp-pm-empty {
    text-align: center;
    padding: 2rem;
    color: var(--text3);
    font-size: 12px
  }

  /* Tech Calendar */
  .tp-cal-legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px 14px 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border)
  }

  .tp-leg {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text2)
  }

  .tp-leg-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%
  }

  .tp-cal-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border)
  }

  .tp-cal-nav {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: .15s
  }

  .tp-cal-nav:hover {
    border-color: #2563eb;
    color: #2563eb
  }

  .tp-cal-title-txt {
    font-size: 14px;
    font-weight: 700
  }

  .tp-btn-today {
    padding: 5px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    transition: .15s
  }

  .tp-btn-today:hover {
    border-color: #2563eb;
    color: #2563eb
  }

  .tp-cal-dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--surface);
    border-bottom: 1px solid var(--border)
  }

  .tp-cal-dow {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--text3);
    padding: 7px 2px
  }

  .tp-cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr)
  }

  .tp-cal-day {
    min-height: 66px;
    padding: 4px 3px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
    position: relative
  }

  .tp-cal-day:nth-child(7n) {
    border-right: none
  }

  .tp-cal-day:hover {
    background: rgba(0, 0, 0, .02)
  }

  .tp-cal-day.other {
    opacity: .2;
    pointer-events: none
  }

  .tp-cal-day.selected {
    background: rgba(37, 99, 235, .08)
  }

  .tp-day-num {
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin-bottom: 2px
  }

  .tp-day-num.today {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 9px
  }

  .tp-ev-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    max-height: 38px
  }

  .tp-ev-pill {
    font-size: 8px;
    padding: 1px 3px;
    border-radius: 3px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    font-weight: 600
  }

  .tp-ev-pill.pend {
    background: var(--yellow-bg);
    color: var(--yellow)
  }

  .tp-ev-pill.done {
    background: var(--green-bg);
    color: var(--green)
  }

  .tp-ev-pill.over {
    background: var(--red-bg);
    color: var(--red)
  }

  .tp-ev-pill.prog {
    background: rgba(37, 99, 235, .10);
    color: #2563eb
  }

  .tp-ev-more {
    font-size: 8px;
    color: var(--text3);
    padding: 0 2px
  }

  .tp-day-nav-bar {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
    gap: 6px
  }

  .tp-dnav-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: .15s
  }

  .tp-dnav-btn:hover {
    border-color: #2563eb;
    color: #2563eb
  }

  .tp-dnav-lbl {
    flex: 1;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    color: var(--text)
  }

  .tp-dnav-close {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: .15s
  }

  .tp-dnav-close:hover {
    border-color: var(--red);
    color: var(--red)
  }

  .tp-det-card {
    background: var(--surface);
    margin: 10px 14px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border)
  }

  .tp-det-hdr {
    padding: 9px 13px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    color: var(--teal)
  }

  .tp-det-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 13px;
    border-bottom: 1px solid var(--border);
    gap: 8px
  }

  .tp-det-row:last-child {
    border-bottom: none
  }

  .tp-dr-machine {
    font-size: 12px;
    font-weight: 700
  }

  .tp-dr-sub {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px
  }

  .tp-dr-right {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0
  }

  .tp-dpill {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap
  }

  .tp-dpill.pend {
    background: var(--yellow-bg);
    color: var(--yellow)
  }

  .tp-dpill.over {
    background: var(--red-bg);
    color: var(--red)
  }

  .tp-dpill.done {
    background: var(--green-bg);
    color: var(--green)
  }

  .tp-dpill.prog {
    background: rgba(37, 99, 235, .10);
    color: #2563eb
  }

  .tp-dbtn {
    font-size: 10px;
    padding: 4px 9px;
    border-radius: 6px;
    border: 1px solid rgba(13, 148, 136, .3);
    background: transparent;
    color: var(--teal);
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
    transition: .15s
  }

  .tp-dbtn:hover {
    background: var(--teal-bg)
  }

  .tp-dbtn-done {
    font-size: 10px;
    color: var(--green);
    white-space: nowrap
  }

  .tp-no-ev {
    text-align: center;
    padding: 1.5rem;
    color: var(--text3);
    font-size: 11px
  }

  .tp-cal-wrap {
    padding-bottom: 16px
  }

  /* Tech Modal */
  .tp-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, .55);
    z-index: 6000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(3px)
  }

  .tp-modal-overlay.show {
    opacity: 1;
    pointer-events: all
  }

  .tp-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-width: 440px;
    max-height: 88vh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform .25s;
    padding-bottom: env(safe-area-inset-bottom, 16px)
  }

  .tp-modal-overlay.show .tp-modal {
    transform: translateY(0)
  }

  .tp-modal-hdr {

  .eng-kpi.ek-purple .eng-kpi-icon {

  }

  .eng-kpi.ek-green .eng-kpi-icon {
    color: #10b981
  }

  .eng-kpi.ek-blue .eng-kpi-icon {
    color: #3b82f6
  }

  }

  .eng-kpi.ek-teal .eng-kpi-val {
    color: #14b8a6
  }

  .eng-kpi.ek-yellow .eng-kpi-val {

  }

  .eng-kpi.ek-purple .eng-kpi-val {
